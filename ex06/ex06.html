<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
      <h1 class="text-4xl font-bold text-center text-blue-600 mb-8">
        Tailwind CSS 시작하기
      </h1>
      <div class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-semibold mb-4">환영합니다!</h2>
        <p class="text-gray-700 leading-relaxed">
          Tailwind CSS를 사용하면 HTML만으로 아름다운 디자인을 만들 수 있습니다.
        </p>
      </div>
    </div>

    <! -- 버튼 예시 -->
    <button
      class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600"
    >
      성공
    </button>
    <button
      class="border-2 border-blue-500 text-blue-500 px-6 py-2 rounded hover:bg-blue-50"
    >
      아웃라인
    </button>

    <div class="container mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-center mb-8">상품 목록</h1>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      >
        <!-- 카드 1 -->
        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow"
        >
          <img
            src="https://placehold.co/300x200"
            alt="상품"
            class="w-full h-48 object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg mb-2">상품명</h3>
            <p class="text-gray-600 text-sm mb-4">상품 설명입니다.</p>
            <div class="flex items-center justify-between">
              <span class="text-xl font-bold text-blue-600">₩29,900</span>
              <button
                class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600"
              >
                구매
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow"
        >
          <img
            src="https://placehold.co/300x200"
            alt="상품"
            class="w-full h-48 object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg mb-2">상품명</h3>
            <p class="text-gray-600 text-sm mb-4">상품 설명입니다.</p>
            <div class="flex items-center justify-between">
              <span class="text-xl font-bold text-blue-600">₩29,900</span>
              <button
                class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600"
              >
                구매
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow"
        >
          <img
            src="https://placehold.co/300x200"
            alt="상품"
            class="w-full h-48 object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold text-lg mb-2">상품명</h3>
            <p class="text-gray-600 text-sm mb-4">상품 설명입니다.</p>
            <div class="flex items-center justify-between">
              <span class="text-xl font-bold text-blue-600">₩29,900</span>
              <button
                class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600"
              >
                구매
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Hover -->
    <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
      마우스를 올려보세요
    </button>
    <!-- Focus -->
    <input
      class="border-2 border-gray-300 focus:border-blue-500 focus:outline-none px-4 py-2 rounded"
      type="text"
      placeholder="클릭하면 테두리 변경"
    />
    <!-- Active -->
    <button class="bg-blue-500 active:bg-blue-700 text-white px-4 py-2 rounded">
      클릭 시 어두워짐
    </button>
    <!-- 조합 -->
    <a
      href="#"
      class="text-blue-600 hover:text-blue-800 hover:underline transition-colors"
    >
      링크 텍스트
    </a>

    <!-- 부드러운 전환 -->
    <div
      class="bg-blue-500 hover:bg-blue-600 transition-colors duration-300 text-center m-3"
    >
      색상 전환
    </div>
    <div
      class="bg-blue-500 hover:bg-blue-600 text-white text-center py-3 rounded-lg transition-all duration-300 ease-in-out shadow-md hover:shadow-lg hover:-translate-y-1 m-3"
    >
      지피티가 만들어줬더염
    </div>
    <div
      class="transform hover:scale-110 transition-transform duration-300 flex justify-center"
    >
      크기 변환
    </div>
    <!-- 그림자 애니메이션 -->
    <div
      class="shadow-md hover:shadow-xl transition-shadow duration-300flex justify -center"
    >
      그림자 변화
    </div>
    <!-- 복합 애니메이션 -->
    <div
      class="transform hover:scale-105 hover:shadow-lg transition-all duration-300flex justify -center"
    >
      종합 효과
    </div>
  </body>
</html>
