<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>글자 수 카운터</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        max-width: 600px;
        margin: 0 auto;
      }

      textarea {
        width: 100%;
        min-height: 200px;
        padding: 0.5rem;
        font-size: 1rem;
      }

      .count {
        color: #666;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <h1>나의 메모</h1>
    <textarea id="memoText" placeholder="여기에 글을 쓰세요..."></textarea>
    <div class="count">
      글자: <span id="charCount">0</span> · 단어: <span id="wordCount">0</span>
    </div>

    <script>
      const textarea = document.querySelector("#memoText");
      const charEl = document.querySelector("#charCount");
      const wordEl = document.querySelector("#wordCount");

      // TODO 1: 페이지 로드 시 localStorage에서 저장된 글 복원
      //         힌트: localStorage.getItem('memo'), textarea.value = ...
      localStorage.getItem("memo") &&
        (textarea.value = localStorage.getItem("memo"));
      charEl.textContent = textarea.value.length;

      // TODO 2: textarea의 input 이벤트로 글자/단어 수 갱신 + localStorage 저장
      //         힌트: text.length (글자 수), text.trim().split(/\s+/).filter(w => w).length (단어 수)
      textarea.addEventListener("input", () => {
        charEl.textContent = textarea.value.length;
        wordEl.textContent = textarea.value
          .trim()
          .split(/\s+/)
          .filter((w) => w).length;
        localStorage.setItem("memo", textarea.value);
      });
    </script>
  </body>
</html>
